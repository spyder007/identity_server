defaultPodOptions:
  imagePullSecrets:
    - name: cr-spydersoft-github

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 1
    strategy: RollingUpdate
    containers:
      main:
        image:
          repository: ghcr.io/spyder007/identity_server
          pullPolicy: IfNotPresent
          tag: latest
        probes:
          # Cold start does EF Core migration-history checks plus Duende
          # IdentityServer's automatic signing-key generation (no cached
          # keys on first-ever boot against a fresh secret) -- confirmed
          # live during the test-environment cutover: with no startupProbe,
          # liveness's old initialDelaySeconds: 0 / failureThreshold: 3
          # (~30s) killed the container via SIGTERM mid-startup, cancelling
          # Kestrel's own port bind (TaskCanceledException) and
          # crash-looping indefinitely. startupProbe gives real boot time
          # before liveness/readiness are evaluated at all.
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 12
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
  admin-api:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 1
    strategy: RollingUpdate
    containers:
      main:
        image:
          repository: ghcr.io/spyder007/identity_admin_api
          pullPolicy: IfNotPresent
          tag: latest
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
  admin-frontend:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 1
    strategy: RollingUpdate
    containers:
      main:
        image:
          repository: ghcr.io/spyder007/identity_admin_frontend
          pullPolicy: IfNotPresent
          tag: latest
        # admin-frontend's OidcProxy.Net BFF reverse-proxies /api/** to
        # admin-api's Service within this same release/namespace. Computed
        # via the chart's own naming helper (admin-api is not the primary
        # service, so bjw-s names it "<fullname>-admin-api") rather than
        # hardcoded, so a release rename can't silently break this like it
        # did when these apps lived in separate, differently-named releases
        # (old config hardcoded "http://identity-server-admin-api/").
        env:
          - name: OidcProxySettings__ReverseProxy__Clusters__adminApi__Destinations__destination1__Address
            value: 'http://{{ include "identity.fullname" . }}-admin-api/'
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3

service:
  main:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        targetPort: 8080
  admin-api:
    enabled: true
    controller: admin-api
    nameOverride: admin-api
    primary: false
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        targetPort: 8080
  admin-frontend:
    enabled: true
    controller: admin-frontend
    nameOverride: admin-frontend
    primary: false
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        targetPort: 8080

route:
  main:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: main
        namespace: envoy-gateway-system
        group: gateway.networking.k8s.io
        kind: Gateway
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: 80
  admin-api:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: main
        namespace: envoy-gateway-system
        group: gateway.networking.k8s.io
        kind: Gateway
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: admin-api
            port: 80
  admin-frontend:
    enabled: true
    kind: HTTPRoute
    parentRefs:
      - name: main
        namespace: envoy-gateway-system
        group: gateway.networking.k8s.io
        kind: Gateway
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: admin-frontend
            port: 80

env_name: dev
